<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气象监测与风电功率预测系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    
    <!-- Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#0E42D2',
                        accent: '#36BFFA',
                        neutral: '#F5F7FA',
                        'neutral-dark': '#E5E6EB',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .btn-active {
                @apply bg-secondary transform scale-[0.98];
            }
            .panel-shadow {
                @apply shadow-md shadow-gray-200;
            }
            .transition-bg {
                @apply transition-colors duration-200 ease-in-out;
            }
            .scrollbar-thin {
                scrollbar-width: thin;
            }
            .scrollbar-thin::-webkit-scrollbar {
                width: 4px;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                @apply bg-gray-300 rounded-full;
            }
            .fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            .export-progress {
                animation: pulse 1.5s infinite;
            }
            .date-divider {
                @apply bg-primary/10 text-primary font-medium py-1 px-2 rounded my-3 text-center;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.6; }
                100% { opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen flex flex-col">
    <!-- 标题栏 -->
    <header class="bg-primary text-white py-4 px-6 shadow-md">
        <h1 class="text-[clamp(1.25rem,3vw,1.75rem)] font-bold text-center">风电爬坡预测系统 v1.0</h1>
    </header>

    <!-- 操作栏 -->
    <div class="bg-white p-4 shadow-sm flex flex-wrap items-center gap-4">
        <div class="flex items-center gap-2">
            <label for="datePicker" class="text-gray-700 font-medium">预测时段选择：</label>
            <input type="date" id="datePicker" class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50">
        </div>
        
        <button id="meteorologyBtn" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-md transition-bg flex items-center gap-2">
            <i class="fa fa-cloud"></i> 气象监测
        </button>
        
        <button id="generateBtn" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-md transition-bg flex items-center gap-2">
            <i class="fa fa-play"></i> 开始生成
        </button>
        
        <button id="exportBtn" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-md transition-bg flex items-center gap-2">
            <i class="fa fa-download"></i> <span id="exportText">场景导出</span>
        </button>
        
        <button id="refreshBtn" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-md transition-bg">
            <i class="fa fa-refresh"></i>
        </button>
    </div>

    <!-- 主体内容区 - 三栏布局：左(任务日志)、中(结果展示)、右(图表选择) -->
    <main class="flex-1 flex flex-col lg:flex-row gap-4 p-4">
        <!-- 左侧：任务日志面板 - 固定尺寸，内容过多时可滚动 -->
        <div class="lg:w-1/5 bg-white rounded-lg panel-shadow flex flex-col h-[calc(100vh-150px)]">
            <div class="p-3 border-b border-gray-200">
                <button id="logTabBtn" class="w-full text-left bg-primary text-white p-2 rounded-md font-medium">任务日志</button>
            </div>
            
            <div id="taskLogContainer" class="flex-1 p-3 overflow-hidden">
                <div id="taskLog" class="h-full overflow-y-auto scrollbar-thin space-y-2 text-sm pr-1">
                    <!-- 日志内容将通过JS动态添加 -->
                </div>
            </div>
        </div>

        <!-- 中间：结果展示区 -->
        <div class="lg:flex-1 bg-white rounded-lg panel-shadow flex flex-col h-[calc(100vh-150px)]">
            <div class="p-3 border-b border-gray-200 font-medium text-gray-700">结果展示</div>
            
            <!-- 图表展示区 -->
            <div class="flex-1 p-4">
                <div id="meteorologyChartContainer" class="h-full hidden">
                    <canvas id="meteorologyChart"></canvas>
                </div>
                
                <div id="resultChartContainer" class="h-full hidden">
                    <canvas id="resultChart"></canvas>
                </div>
                
                <div id="processingIndicator" class="h-full hidden items-center justify-center text-gray-500">
                    <div class="text-center">
                        <i class="fa fa-circle-o-notch fa-spin text-3xl mb-3"></i>
                        <p>正在处理数据，请等待...</p>
                    </div>
                </div>
                
                <div id="initialMessage" class="h-full flex items-center justify-center text-gray-500">
                    请选择日期并点击"开始生成"查看结果
                </div>
            </div>
            
            <!-- 结果说明区 -->
            <div id="resultExplanation" class="p-4 border-t border-gray-200 bg-neutral/50 hidden">
                <h3 class="font-medium text-gray-800 mb-2">结果说明</h3>
                <p class="text-sm text-gray-600" id="explanationText">
                    这里将显示根据所选日期生成的风电功率预测结果说明。实际应用中，将根据选择的日期读取对应的说明文件进行展示。
                </p>
            </div>
        </div>

        <!-- 右侧：结果图表选择面板 -->
        <div class="lg:w-1/5 bg-white rounded-lg panel-shadow p-3 h-[calc(100vh-150px)]">
            <h3 class="font-medium text-gray-700 mb-3 border-b border-gray-200 pb-2">结果图表选择</h3>
            <div class="space-y-2">
                <button class="result-btn w-full text-left bg-primary text-white p-2 rounded-md transition-bg flex items-center gap-2 active" data-chart="power">
                    <i class="fa fa-line-chart"></i> 风电功率预测结果
                </button>
                <button class="result-btn w-full text-left bg-primary text-white p-2 rounded-md transition-bg flex items-center gap-2" data-chart="events">
                    <i class="fa fa-bolt"></i> 爬坡事件预测总览
                </button>
                <button class="result-btn w-full text-left bg-primary text-white p-2 rounded-md transition-bg flex items-center gap-2" data-chart="startTime">
                    <i class="fa fa-clock-o"></i> 开始爬坡时间结果
                </button>
                <button class="result-btn w-full text-left bg-primary text-white p-2 rounded-md transition-bg flex items-center gap-2" data-chart="duration">
                    <i class="fa fa-hourglass-half"></i> 爬坡持续时间结果
                </button>
                <button class="result-btn w-full text-left bg-primary text-white p-2 rounded-md transition-bg flex items-center gap-2" data-chart="rate">
                    <i class="fa fa-tachometer"></i> 爬坡率结果
                </button>
                <button class="result-btn w-full text-left bg-primary text-white p-2 rounded-md transition-bg flex items-center gap-2" data-chart="amplitude">
                    <i class="fa fa-signal"></i> 爬坡幅度结果
                </button>
            </div>
        </div>
    </main>

    <script>
        // 全局变量
        let logInterval;
        let currentLogIndex = 0;
        let meteorologyChart = null;
        let resultChart = null;
        let selectedDate = '';
        let currentChartType = 'power';
        let isExporting = false;
        let processedDates = new Set(); // 记录已处理的日期
        
        // 所有图表类型
        const allChartTypes = ['power', 'events', 'startTime', 'duration', 'rate', 'amplitude'];
        
        // 任务日志数据 - 为关键步骤添加标识但不做视觉区分
        const taskLogs = [
            {text: '1. 开始读取数据...', isKeyStep: false},
            {text: '2. 读取数据完成', isKeyStep: false},
            {text: '3. 开始预处理气象数据', isKeyStep: true},
            {text: '4. 气象数据预处理完成', isKeyStep: false},
            {text: '5. 开始预测风电功率', isKeyStep: true},
            {text: '6. 风电功率预测计算中...', isKeyStep: true},
            {text: '7. 风电功率预测完成', isKeyStep: false},
            {text: '8. 开始分析爬坡事件', isKeyStep: true},
            {text: '9. 爬坡事件分析完成', isKeyStep: false},
            {text: '10. 生成结果报告', isKeyStep: true},
            {text: '11. 任务完成，结果输出', isKeyStep: false}
        ];

        // DOM 元素
        const datePicker = document.getElementById('datePicker');
        const meteorologyBtn = document.getElementById('meteorologyBtn');
        const generateBtn = document.getElementById('generateBtn');
        const exportBtn = document.getElementById('exportBtn');
        const exportText = document.getElementById('exportText');
        const refreshBtn = document.getElementById('refreshBtn');
        const taskLog = document.getElementById('taskLog');
        const meteorologyChartContainer = document.getElementById('meteorologyChartContainer');
        const resultChartContainer = document.getElementById('resultChartContainer');
        const initialMessage = document.getElementById('initialMessage');
        const processingIndicator = document.getElementById('processingIndicator');
        const resultExplanation = document.getElementById('resultExplanation');
        const resultBtns = document.querySelectorAll('.result-btn');

        // 初始化日期选择器为今天
        const today = new Date();
        const formattedDate = today.toISOString().split('T')[0];
        datePicker.value = formattedDate;
        selectedDate = formattedDate;

        // 按钮点击效果
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('mousedown', () => {
                if (!button.disabled) {
                    button.classList.add('btn-active');
                }
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('btn-active');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('btn-active');
            });
        });

        // 日期选择事件
        datePicker.addEventListener('change', (e) => {
            selectedDate = e.target.value;
            console.log('选择的日期:', selectedDate);
        });

        // 气象监测按钮事件
        meteorologyBtn.addEventListener('click', () => {
            if (!selectedDate) {
                alert('请先选择日期');
                return;
            }
            
            // 隐藏其他内容，显示气象图表
            initialMessage.classList.add('hidden');
            processingIndicator.classList.add('hidden');
            resultChartContainer.classList.add('hidden');
            resultExplanation.classList.add('hidden');
            meteorologyChartContainer.classList.remove('hidden');
            
            // 绘制气象监测图表
            drawMeteorologyChart();
        });

        // 开始生成按钮事件
        generateBtn.addEventListener('click', () => {
            if (!selectedDate) {
                alert('请先选择日期');
                return;
            }
            
            // 不重置日志，只添加新的日志内容
            currentLogIndex = 0;
            
            // 隐藏其他内容，显示处理指示器
            initialMessage.classList.add('hidden');
            meteorologyChartContainer.classList.add('hidden');
            resultChartContainer.classList.add('hidden');
            resultExplanation.classList.add('hidden');
            processingIndicator.classList.remove('hidden');
            processingIndicator.classList.add('flex');
            
            // 添加日期分隔线（如果是新日期）
            if (!processedDates.has(selectedDate)) {
                addDateDivider(selectedDate);
                processedDates.add(selectedDate);
            }
            
            // 开始滚动显示日志
            startLogScrolling();
        });

        // 添加日期分隔线
        function addDateDivider(date) {
            const divider = document.createElement('div');
            divider.className = 'date-divider fade-in';
            
            // 格式化日期显示
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formatted = new Date(date).toLocaleDateString('zh-CN', options);
            
            divider.textContent = `${formatted} 处理日志`;
            taskLog.appendChild(divider);
            
            // 滚动到底部
            taskLog.scrollTop = taskLog.scrollHeight;
        }

        // 场景导出按钮事件 - 下载所有结果图表
        exportBtn.addEventListener('click', () => {
            if (isExporting) return;
            
            if (!selectedDate || initialMessage.classList.contains('hidden') === false) {
                alert('请先选择日期并生成结果');
                return;
            }
            
            // 开始导出流程
            startExport();
        });

        // 开始导出所有图表
        function startExport() {
            isExporting = true;
            exportBtn.disabled = true;
            exportText.textContent = '正在导出...';
            exportText.classList.add('export-progress');
            
            // 添加导出日志
            addExportLog(`开始导出 ${selectedDate} 的所有预测图表...`);
            
            // 先确保气象图表已生成
            let exportQueue = [];
            
            // 如果气象图表已显示，加入导出队列
            if (!meteorologyChartContainer.classList.contains('hidden')) {
                exportQueue.push({type: 'meteorology', name: '气象监测数据'});
            }
            
            // 添加所有结果图表到导出队列
            allChartTypes.forEach(type => {
                exportQueue.push({
                    type: 'result', 
                    chartType: type,
                    name: getChartName(type)
                });
            });
            
            // 依次导出图表
            exportChartsInSequence(exportQueue, 0);
        }

        // 按顺序导出图表
        function exportChartsInSequence(queue, index) {
            if (index >= queue.length) {
                // 导出完成
                addExportLog('所有图表导出完成！');
                setTimeout(() => {
                    isExporting = false;
                    exportBtn.disabled = false;
                    exportText.textContent = '场景导出';
                    exportText.classList.remove('export-progress');
                }, 1000);
                return;
            }
            
            const item = queue[index];
            
            if (item.type === 'meteorology' && meteorologyChart) {
                // 导出气象图表
                addExportLog(`正在导出: ${item.name}`);
                exportChart(meteorologyChart, `${selectedDate}_${item.name}`);
                
                // 延迟处理下一个，避免浏览器下载冲突
                setTimeout(() => {
                    exportChartsInSequence(queue, index + 1);
                }, 1000);
            } 
            else if (item.type === 'result') {
                // 导出结果图表
                addExportLog(`正在导出: ${item.name}`);
                
                // 绘制当前类型的图表并导出
                drawResultChart(item.chartType, () => {
                    if (resultChart) {
                        exportChart(resultChart, `${selectedDate}_${item.name}`);
                    }
                    
                    // 延迟处理下一个
                    setTimeout(() => {
                        exportChartsInSequence(queue, index + 1);
                    }, 1000);
                });
            }
            else {
                // 处理意外情况
                exportChartsInSequence(queue, index + 1);
            }
        }

        // 导出单个图表为PNG
        function exportChart(chart, filename) {
            try {
                // 获取图表的Base64图像数据
                const dataUrl = chart.toBase64Image();
                
                // 创建下载链接
                const link = document.createElement('a');
                link.download = `${filename.replace(/\s+/g, '_')}.png`;
                link.href = dataUrl;
                
                // 触发下载
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                console.error('导出图表失败:', error);
                addExportLog(`导出 ${filename} 失败: ${error.message}`);
            }
        }

        // 添加导出相关日志
        function addExportLog(text) {
            const entry = document.createElement('p');
            entry.className = 'py-1 px-2 bg-primary/10 text-primary rounded transition-all duration-300 opacity-0 transform translate-y-2';
            entry.textContent = `[导出] ${text}`;
            taskLog.appendChild(entry);
            
            // 触发动画
            setTimeout(() => {
                entry.classList.remove('opacity-0', 'translate-y-2');
            }, 10);
            
            // 滚动到底部
            taskLog.scrollTop = taskLog.scrollHeight;
        }

        // 获取图表名称
        function getChartName(type) {
            const names = {
                'power': '风电功率预测结果',
                'events': '爬坡事件预测总览',
                'startTime': '开始爬坡时间结果',
                'duration': '爬坡持续时间结果',
                'rate': '爬坡率结果',
                'amplitude': '爬坡幅度结果'
            };
            return names[type] || type;
        }

        // 刷新按钮事件 - 只有点击刷新才会清除日志
        refreshBtn.addEventListener('click', () => {
            if (isExporting) {
                alert('正在导出图表，请等待完成后再刷新');
                return;
            }
            resetApplication();
        });

        // 结果图表选择按钮事件
        resultBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isExporting) return;
                
                currentChartType = btn.dataset.chart;
                updateResultButtons();
                drawResultChart(currentChartType);
            });
        });

        // 更新结果按钮状态
        function updateResultButtons() {
            resultBtns.forEach(btn => {
                if (btn.dataset.chart === currentChartType) {
                    btn.classList.add('bg-secondary');
                    btn.classList.remove('bg-primary');
                } else {
                    btn.classList.add('bg-primary');
                    btn.classList.remove('bg-secondary');
                }
            });
        }

        // 重置日志 - 只有刷新时才调用
        function resetLogs() {
            clearInterval(logInterval);
            taskLog.innerHTML = '';
            currentLogIndex = 0;
            processedDates.clear(); // 清空已处理日期记录
        }

        // 开始滚动显示日志
        function startLogScrolling() {
            // 不重置日志，继续添加新内容
            
            // 显示第一条日志
            addLogEntry(taskLogs[0]);
            currentLogIndex = 1;
            
            // 继续显示后续日志
            showNextLog();
        }

        // 显示下一条日志，根据是否为关键步骤设置不同的停顿时间
        function showNextLog() {
            if (currentLogIndex < taskLogs.length) {
                // 添加当前日志条目
                addLogEntry(taskLogs[currentLogIndex]);
                currentLogIndex++;
                
                // 确定下一条日志的延迟时间：关键步骤停顿更长
                const currentLog = taskLogs[currentLogIndex - 1];
                const delay = currentLog.isKeyStep ? 3000 : Math.random() * 1000 + 1000;
                
                // 设置延迟显示下一条日志
                setTimeout(showNextLog, delay);
            } else {
                // 所有日志显示完毕后，显示结果
                setTimeout(showResults, 500); // 短暂延迟，增强体验
            }
        }

        // 日志显示完毕后显示结果
        function showResults() {
            processingIndicator.classList.add('hidden');
            processingIndicator.classList.remove('flex');
            resultChartContainer.classList.remove('hidden');
            resultExplanation.classList.remove('hidden');
            
            // 添加淡入动画
            resultChartContainer.classList.add('fade-in');
            resultExplanation.classList.add('fade-in');
            
            // 绘制默认的风电功率预测结果图
            currentChartType = 'power';
            updateResultButtons();
            drawResultChart(currentChartType);
        }

        // 添加日志条目，所有步骤使用相同样式
        function addLogEntry(log) {
            const entry = document.createElement('p');
            // 所有日志使用相同样式
            entry.className = 'py-1 px-2 bg-neutral/50 rounded transition-all duration-300 opacity-0 transform translate-y-2';
            entry.textContent = log.text;
            taskLog.appendChild(entry);
            
            // 触发重排后添加动画
            setTimeout(() => {
                entry.classList.remove('opacity-0', 'translate-y-2');
            }, 10);
            
            // 滚动到底部
            taskLog.scrollTop = taskLog.scrollHeight;
        }

        // 重置应用状态 - 只有刷新时才调用
        function resetApplication() {
            clearTimeout(logInterval);
            resetLogs(); // 只有这里会清除日志
            
            // 显示初始消息
            meteorologyChartContainer.classList.add('hidden');
            resultChartContainer.classList.add('hidden');
            resultExplanation.classList.add('hidden');
            processingIndicator.classList.add('hidden');
            processingIndicator.classList.remove('flex');
            initialMessage.classList.remove('hidden');
            
            // 重置图表
            if (meteorologyChart) {
                meteorologyChart.destroy();
                meteorologyChart = null;
            }
            if (resultChart) {
                resultChart.destroy();
                resultChart = null;
            }
            
            // 重置按钮状态
            currentChartType = 'power';
            updateResultButtons();
        }

        // 绘制气象监测图表
        function drawMeteorologyChart() {
            const ctx = document.getElementById('meteorologyChart').getContext('2d');
            
            // 如果图表已存在，先销毁
            if (meteorologyChart) {
                meteorologyChart.destroy();
            }
            
            // 生成模拟的气象数据（实际应用中会从文件读取）
            const hours = Array.from({length: 24}, (_, i) => `${i}:00`);
            const temperatureData = Array.from({length: 24}, () => Math.floor(Math.random() * 15) + 10);
            const windSpeedData = Array.from({length: 24}, () => Math.floor(Math.random() * 10) + 3);
            
            // 创建图表
            meteorologyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [
                        {
                            label: '温度 (°C)',
                            data: temperatureData,
                            borderColor: '#F53F3F',
                            backgroundColor: 'rgba(245, 63, 63, 0.1)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: '风速 (m/s)',
                            data: windSpeedData,
                            borderColor: '#165DFF',
                            backgroundColor: 'rgba(22, 93, 255, 0.1)',
                            tension: 0.3,
                            fill: true,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: `${selectedDate} 气象监测数据`,
                            font: {
                                size: 16
                            }
                        },
                        legend: {
                            position: 'top',
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '温度 (°C)'
                            }
                        },
                        y1: {
                            beginAtZero: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '风速 (m/s)'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        }
                    }
                }
            });
        }

        // 绘制结果图表，支持回调函数
        function drawResultChart(type, callback) {
            const ctx = document.getElementById('resultChart').getContext('2d');
            const explanationText = document.getElementById('explanationText');
            
            // 如果图表已存在，先销毁
            if (resultChart) {
                resultChart.destroy();
            }
            
            // 生成模拟数据（实际应用中会从文件读取）
            const hours = Array.from({length: 24}, (_, i) => `${i}:00`);
            let chartData, chartOptions, explanation;
            
            switch(type) {
                case 'power':
                    // 风电功率预测结果
                    const powerData = Array.from({length: 24}, () => Math.floor(Math.random() * 500) + 500);
                    chartData = {
                        labels: hours,
                        datasets: [{
                            label: '风电功率 (kW)',
                            data: powerData,
                            borderColor: '#00B42A',
                            backgroundColor: 'rgba(0, 180, 42, 0.1)',
                            tension: 0.3,
                            fill: true
                        }]
                    };
                    chartOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${selectedDate} 风电功率预测结果`,
                                font: {
                                    size: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '功率 (kW)'
                                }
                            }
                        }
                    };
                    explanation = `${selectedDate}的风电功率预测显示，全天功率在500-1000kW之间波动。峰值出现在下午3点左右，达到约980kW；谷值出现在凌晨4点，约为520kW。整体趋势符合该季节典型的风力发电模式。`;
                    break;
                    
                case 'events':
                    // 爬坡事件预测总览
                    const eventData = Array.from({length: 24}, (_, i) => 
                        (i >= 6 && i <= 9) || (i >= 15 && i <= 18) ? Math.floor(Math.random() * 300) + 200 : 0
                    );
                    chartData = {
                        labels: hours,
                        datasets: [{
                            label: '爬坡事件强度',
                            data: eventData,
                            backgroundColor: 'rgba(255, 125, 0, 0.7)',
                            borderColor: '#FF7D00',
                            borderWidth: 1
                        }]
                    };
                    chartOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${selectedDate} 爬坡事件预测总览`,
                                font: {
                                    size: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '强度'
                                }
                            }
                        }
                    };
                    explanation = `${selectedDate}预计将出现两次主要爬坡事件：第一次在早晨6点至9点，强度中等；第二次在下午15点至18点，强度较高。建议在这些时段加强电网监控，确保稳定运行。`;
                    break;
                    
                case 'startTime':
                    // 开始爬坡时间结果
                    chartData = {
                        labels: ['早晨事件', '下午事件'],
                        datasets: [{
                            label: '开始时间',
                            data: [7, 16],
                            backgroundColor: 'rgba(22, 93, 255, 0.7)',
                        }]
                    };
                    chartOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${selectedDate} 开始爬坡时间结果`,
                                font: {
                                    size: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '时间 (小时)'
                                },
                                ticks: {
                                    callback: function(value) {
                                        return value + ':00';
                                    }
                                }
                            }
                        }
                    };
                    explanation = `${selectedDate}的爬坡事件预计开始于两个时间点：早晨7点和下午16点。这些时间点基于风速变化率和历史数据模式预测得出，可能存在±30分钟的误差范围。`;
                    break;
                    
                case 'duration':
                    // 爬坡持续时间结果
                    chartData = {
                        labels: ['早晨事件', '下午事件'],
                        datasets: [{
                            label: '持续时间 (小时)',
                            data: [2.5, 3],
                            backgroundColor: 'rgba(153, 102, 255, 0.7)',
                        }]
                    };
                    chartOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${selectedDate} 爬坡持续时间结果`,
                                font: {
                                    size: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '小时'
                                }
                            }
                        }
                    };
                    explanation = `${selectedDate}的两次爬坡事件预计持续时间分别为2.5小时（早晨）和3小时（下午）。持续时间较长的下午事件需要更多的电网调节准备。`;
                    break;
                    
                case 'rate':
                    // 爬坡率结果
                    chartData = {
                        labels: ['早晨事件', '下午事件'],
                        datasets: [{
                            label: '爬坡率 (kW/小时)',
                            data: [120, 180],
                            backgroundColor: 'rgba(255, 99, 132, 0.7)',
                        }]
                    };
                    chartOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${selectedDate} 爬坡率结果`,
                                font: {
                                    size: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    };
                    explanation = `${selectedDate}的爬坡率数据显示，下午事件的爬坡率(180kW/小时)高于早晨事件(120kW/小时)。较高的爬坡率意味着功率变化更迅速，对电网调节能力要求更高。`;
                    break;
                    
                case 'amplitude':
                    // 爬坡幅度结果
                    chartData = {
                        labels: ['早晨事件', '下午事件'],
                        datasets: [{
                            label: '爬坡幅度 (kW)',
                            data: [300, 540],
                            backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        }]
                    };
                    chartOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${selectedDate} 爬坡幅度结果`,
                                font: {
                                    size: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    };
                    explanation = `${selectedDate}的两次爬坡事件预计幅度分别为300kW（早晨）和540kW（下午）。下午事件的大幅度变化需要提前做好电力调度准备，以应对这种较大的功率波动。`;
                    break;
            }
            
            // 更新说明文本
            explanationText.textContent = explanation;
            
            // 创建图表
            resultChart = new Chart(ctx, {
                type: type === 'power' || type === 'events' ? 'line' : 'bar',
                data: chartData,
                options: chartOptions
            });
            
            // 如果提供了回调函数，在图表绘制完成后调用
            if (typeof callback === 'function') {
                // 给图表绘制一些时间
                setTimeout(callback, 500);
            }
        }
    </script>
    </body></html>
